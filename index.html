<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Le Cercle — 解鎖獨家禮遇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: #1a3854;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.8rem 3.5rem;
  }

  .container {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 420px;
  }

  .logo-wrap {
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 0.2s ease forwards;
  }
  .logo-wrap img {
    width: 200px; height: auto; display: block; margin: 0 auto;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-style: italic;
    font-size: clamp(32px, 9vw, 44px);
    color: #ffffff;
    text-align: center; line-height: 1.2;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadein 1s 0.4s ease forwards;
  }

  .sub {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 300; font-size: 12px;
    letter-spacing: 0.22em; color: #c3a78b;
    text-align: center; text-transform: uppercase;
    margin-bottom: 2.8rem;
    opacity: 0;
    animation: fadein 1s 0.6s ease forwards;
  }

  .tasks {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%; margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 0.8s ease forwards;
  }

  .task-btn {
    display: flex; align-items: center; gap: 18px;
    padding: 20px 22px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(195,167,139,0.3);
    border-radius: 4px;
    text-decoration: none;
    transition: background 0.3s, border-color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-btn:active { transform: scale(0.98); }
  .task-btn.done {
    background: rgba(195,167,139,0.12);
    border-color: rgba(195,167,139,0.6);
  }

  .task-icon {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .task-text { flex: 1; }
  .task-title {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 600; font-size: 14px; letter-spacing: 0.1em;
    color: #ffffff; text-transform: uppercase; margin-bottom: 4px;
  }
  .task-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: #a8bccf; font-style: italic;
  }

  .check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(195,167,139,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.4s;
  }
  .check-inner { display: none; }
  .task-btn.done .check {
    background: #c3a78b; border-color: #c3a78b;
  }
  .task-btn.done .check-inner { display: block; }

  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, rgba(195,167,139,0.25), transparent);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 1s ease forwards;
  }

  /* 兌換說明 — 婉轉版 */
  .verify-box {
    width: 100%;
    border-left: 2px solid rgba(195,167,139,0.45);
    padding: 4px 0 4px 20px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 1s ease forwards;
  }
  .verify-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-style: italic;
    color: #c3d0dc; line-height: 1.8;
  }

  .cta-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 100%;
    opacity: 0;
    animation: fadein 1s 1.15s ease forwards;
  }

  .unlock-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; font-style: italic;
    text-align: center; line-height: 1.6;
    color: rgba(195,167,139,0.35);
    transition: color 0.5s;
  }
  .unlock-msg.unlocked { color: #c3a78b; }

  .cta-btn {
    width: 100%;
    padding: 18px 40px;
    background: transparent;
    border: 1px solid rgba(195,167,139,0.2);
    border-radius: 3px;
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 600; font-size: 12px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(195,167,139,0.25); cursor: not-allowed;
    transition: all 0.4s;
  }
  .cta-btn.active {
    color: #c3a78b; border-color: #c3a78b; cursor: pointer;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .cta-btn.confirmed {
    color: #c3a78b; border-color: #c3a78b;
    background: rgba(195,167,139,0.08);
    animation: none; cursor: default;
  }

  .staff-hint {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 300; font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: transparent; text-align: center;
    transition: color 0.5s;
  }
  .staff-hint.show { color: rgba(195,167,139,0.55); }

  #flash {
    position: fixed; inset: 0;
    background: rgba(195,167,139,0.06);
    pointer-events: none; opacity: 0;
    transition: opacity 0.6s; z-index: 99;
  }
  #flash.show { opacity: 1; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(195,167,139,0); }
    50% { box-shadow: 0 0 20px 4px rgba(195,167,139,0.12); }
  }
</style>
</head>

      if (done.t1 && done.t2) {
